<svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Simple claw shape for menu bar -->
  <g fill="#ffffff">
    <!-- Center hub -->
    <circle cx="11" cy="11" r="3"/>

    <!-- Four claw segments -->
    <ellipse cx="6" cy="6" rx="2.5" ry="2"/>
    <ellipse cx="16" cy="6" rx="2.5" ry="2"/>
    <ellipse cx="6" cy="16" rx="2.5" ry="2"/>
    <ellipse cx="16" cy="16" rx="2.5" ry="2"/>

    <!-- Connecting lines -->
    <line x1="8.5" y1="9.5" x2="7.5" y2="7.5" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="13.5" y1="9.5" x2="14.5" y2="7.5" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="8.5" y1="12.5" x2="7.5" y2="14.5" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="13.5" y1="12.5" x2="14.5" y2="14.5" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
